# ─────────────────────────────────────────────────────────────────────────────
# Auto-bump the minor version on every push to main.
#
# On each push the workflow:
#   1. Reads the current version from package.json
#   2. Increments the minor component (e.g. 0.1.0 → 0.2.0)
#   3. Commits & pushes the version bump back to main
#
# Skip the bump by including [skip version] in your commit message.
# ─────────────────────────────────────────────────────────────────────────────
name: Bump minor version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Don't loop on the bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip version]') && !contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump minor version
        run: |
          # Read current version
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Bump minor: 0.1.0 → 0.2.0
          NEW=$(npx semver "$CURRENT" -i minor)
          echo "New version: $NEW"

          # Write back
          npm version "$NEW" --no-git-tag-version
          echo "VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ env.VERSION }} [skip version]"
          git push
